name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v3

      - name: Build native OCR engine (Release x64)
        run: msbuild AIO_SearchEngine/AIO_SearchEngine.vcxproj /p:Configuration=Release /p:Platform=x64 /v:minimal

      - name: Build WPF app (Release x64)
        run: dotnet build "AIO Clipboard & Search/AIO_Hybrid_Clipboard.csproj" -c Release -p:Platform=x64

      - name: Run tests
        run: dotnet test AIO_Hybrid_Clipboard.Tests/AIO_Hybrid_Clipboard.Tests.csproj -c Release
